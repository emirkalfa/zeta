name: Release Drafter

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: release-drafter.yml
          tag: ${{ github.ref_name }}
          name-template: "ZETA $RESOLVED_VERSION"
          tag-prefix: "v"
          version-resolver:
            major:
              labels: ["breaking", "major"]
            minor:
              labels: ["feat", "enhancement", "feature"]
            patch:
              labels: ["fix", "bug", "docs", "chore", "refactor", "test"]
          change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
          categories:
            - title: "Breaking Changes"
              labels: ["breaking", "major"]
            - title: "Yenilikler"
              labels: ["feat", "feature", "enhancement"]
            - title: "Hata Düzeltmeleri"
              labels: ["fix", "bug"]
            - title: "Dokümantasyon"
              labels: ["docs"]
            - title: "Refactor & Test"
              labels: ["refactor", "test", "chore"]
          exclude-labels: ["skip-changelog"]
          template: |
            ## Yenilikler

            $CHANGES

            **Tam değişiklik listesi:** https://github.com/$OWNER/$REPOSITORY/compare/v$RESOLVED_VERSION_BASE...v$RESOLVED_VERSION
